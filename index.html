<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radiology Dept | Patient Portal</title>
    <style>
        :root {
            --primary: #1a4ab2;
            --soft-bg: #f0f4f8;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        /* Main Card Container */
        .portal-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 2;
        }

        .portal-card {
            width: 85%;
            max-width: 360px;
            background: var(--glass);
            border-radius: 24px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .logo-img {
            width: 100%;
            height: auto;
            margin-bottom: 35px;
        }

        /* Professional Medical Button */
        .btn-portal {
            background: linear-gradient(135deg, #1a4ab2, #2563eb);
            color: white;
            border: none;
            padding: 18px 0;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 20px rgba(26, 74, 178, 0.25);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-portal:active {
            transform: scale(0.97);
        }

        /* Footer Styling */
        footer {
            padding: 20px;
            font-size: 11px;
            color: #5c708a;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 700;
            text-align: center;
            opacity: 0.8;
            z-index: 2;
        }

        /* Animation Layers */
        #reveal-circle {
            position: fixed;
            top: 50%; left: 50%; width: 10px; height: 10px;
            background: white; border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 999;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
            pointer-events: none;
        }

        .is-opening #reveal-circle { transform: translate(-50%, -50%) scale(400); }

        #status-msg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; z-index: 1000;
            transition: opacity 0.4s ease 0.4s;
        }

        .is-opening #status-msg { opacity: 1; visibility: visible; }

        .loader {
            width: 40px; height: 40px; border: 3px solid #eee;
            border-top: 3px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body id="page-body">

    <div class="portal-wrapper">
        <div class="portal-card">
            <img src="https://lh3.googleusercontent.com/d/119SZm53-KLTk2Ghs959nrPx4nvVxqfNb" alt="Logo" class="logo-img">
            <button class="btn-portal" onclick="navToAppointment()">
                <span>View Appointment</span>
            </button>
        </div>
    </div>

    <footer>
        ICT Unit - Teaching Hospital, Batticaloa
    </footer>

    <!-- Animation Layer -->
    <div id="reveal-circle"></div>
    
    <div id="status-msg">
        <div class="loader"></div>
        <div style="margin-top:20px; color:var(--primary); font-weight:700; font-size:13px; letter-spacing:1px;">ACCESSING SECURE PORTAL...</div>
    </div>

    <script>
        function navToAppointment() {
            const url = "https://script.google.com/macros/s/AKfycbzoIMB-cywGUbC7wKNzVwfBFoahVEwzI5Um-lkMJZlvPBYHb4uPU-tAefQVvLmz4aIj/exec";
            document.getElementById('page-body').classList.add('is-opening');
            setTimeout(() => { window.location.href = url; }, 1100);
        }
    </script>

</body>
</html>
